<h2 mat-dialog-title class="dialog-title">Nuevo desarrollador externo</h2>
<mat-dialog-content class="dialog-body">
  <form [formGroup]="form" class="dialog-form form-grid">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Nombre y apellido</mat-label>
      <input matInput formControlName="fullName" />
      @if (form.controls.fullName.hasError('required') && form.controls.fullName.touched) {
        <mat-error>El nombre es obligatorio</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Telefono</mat-label>
      <input matInput formControlName="phone" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>CUIT o documento</mat-label>
      <input matInput formControlName="taxId" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Notas</mat-label>
      <textarea matInput rows="3" formControlName="notes"></textarea>
    </mat-form-field>

    <mat-slide-toggle formControlName="isActive" class="full-width">Activo</mat-slide-toggle>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end" class="dialog-actions">
  <button mat-button mat-dialog-close class="action-cancel">Cancelar</button>
  <button mat-flat-button color="primary" class="action-save" (click)="guardar()">Guardar</button>
</mat-dialog-actions>
